<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灯彩堂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/info.css" />
  </head>
  <body>
    <header class="header-top">
      <h1 class="header-logo">
        <a href="index.html">
          <img src="image/logo/logo-white2.png" alt="灯彩堂" />
        </a>
      </h1>
      <button class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="header-nav">
        <ul>
          <li class="nav-item"><a href="index.html">TOP</a></li>
          <li class="nav-item"><a href="about.html">ABOUT</a></li>
          <li class="nav-item"><a href="menu.html">MENU</a></li>
          <li class="nav-item"><a href="info.html" class="current">INFO</a></li>
          <li class="nav-item"><a href="contact.html">CONTACT</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <!-- FVここから↓↓ -->
      <section id="fv">
        <div class="fv-images">
          <img src="image/top-image3.jpg" alt="店内の様子" />
        </div>
        <div class="fv-content">
          <h1>
            <a href="index.html">
              <img src="image/logo/logo-white2.png" alt="灯彩堂のロゴ" />
            </a>
          </h1>
        </div>
      </section>
      <!-- FVここまで↑↑ -->

      <!-- INFOここから↓↓ -->
        <section id="info-page">
            <div class="container">
                <div class="section-title">
                    <h2>INFO</h2>
                    <p class="info-title">店舗情報・アクセス</p>
                </div>
                <!-- メイン画像 -->
                <div class="info-gallery-area">
                    <div class="info-main-image fade-up">
                        <img id="mainImage" 
                            src="image/info-exterior-01.jpg" 
                            alt="店舗外観"
                        >
                    </div>
                <!-- ギャラリー -->
                    <div class="info-gallery">
                        <div class="gallery-item fade-up">
                            <img class="gallery-thumb" src="image/info-exterior-01.jpg" alt="店舗外観">
                        </div>
                        <div class="gallery-item fade-up">
                            <img class="gallery-thumb" src="image/info-gallery-06.jpg" alt="花のある店内">
                        </div>
                        <div class="gallery-item fade-up">
                            <img class="gallery-thumb" src="image/info-gallery-03.jpg" alt="店内窓際カウンター席">
                        </div>
                        <div class="gallery-item fade-up">
                            <img class="gallery-thumb" src="image/info-gallery-04.jpg" alt="店内全体">
                        </div>
                        <div class="gallery-item fade-up">
                            <img class="gallery-thumb" src="image/info-gallery-05.jpg" alt="店内窓際2人席">
                        </div>
                        <div class="gallery-item fade-up">
                            <img class="gallery-thumb" src="image/info-gallery-02.jpg" alt="店内の窓際テーブル席">
                        </div>
                    </div>
                </div>
                <!-- 地図と店舗情報 -->
                    <div class="info-content">
                        <div class="info-map fade-up">
                            <iframe
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13352.243129843875!2d130.54007785541995!3d33.2125027!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3541a92bfa1e0ba5%3A0x25643c8d06e8be0e!2z5YWr5aWz5biC5b255omA!5e0!3m2!1sja!2sjp!4v1781059048634!5m2!1sja!2sjp"
                                style="border: 0"
                                allowfullscreen=""
                                loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade"
                            >
                            </iframe>
                        </div>
                        <div class="info-card fade-up">
                            <div class="info-item">
                                <img class="info-icon"  src="image/clock.png" alt="営業時間">
                                <div class="info-text">
                                    <h3 class="info-label">営業時間</h3>
                                    <p class="info-detail">10:00～18:00（L.O.17:30）</p>
                                </div>
                            </div>
                            <div class="info-item">
                                <img class="info-icon" src="image/calendar.png" alt="定休日">
                                <div class="info-text">
                                    <h3 class="info-label">定休日</h3>
                                    <p class="info-detail">水曜日</p>
                                </div>
                            </div>
                            <div class="info-item">
                                <img class="info-icon" src="image/map-pin.png" alt="地図">
                                <div class="info-text">
                                    <h3 class="info-label">住所</h3>
                                    <p class="info-detail">〒834-0004 福岡県八女市本町123-4</p>
                                </div>
                            </div>
                            <div class="info-item">
                                <img class="info-icon" src="image/phone.png" alt="電話番号">
                                <div class="info-text">
                                    <h3 class="info-label">電話番号</h3>
                                    <p class="info-detail">0943-00-0000</p>
                                </div>
                            </div>
                        </div>
                    </div>
            </div>
        </section>      
      <!-- INFOここまで↑↑ -->
    </main>
    <a href="#fv" class="page-top">
      ↑
      <span>TOP</span>
    </a>
    <footer>
      <div class="footer-logo">
         <a href="index.html">
          <img src="image/logo/logo-white2.png" alt="灯彩堂のロゴ" />
        </a>
      </div>
      <hr />
      <p class="copyright">&copy;2026 灯彩堂</p>
    </footer>
  </body>
  <script src="js/script.js" defer></script>
</html>
